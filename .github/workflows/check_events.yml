yamlname: Check Fishing Events

on:
  schedule:
    # GitHub Actions does not allow scheduling more often than every 5
    # minutes, so the workflow itself is triggered every 5 minutes, but
    # the job below loops internally with short sleeps to check roughly
    # once a minute. The script itself decides whether it's inside the
    # 10:00-03:00 notification window before sending anything.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: fishing-events-check
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (looped ~every 60s within this 5-min run)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TIMEZONE: 'Europe/Amsterdam'
          WINDOW_START: '10:00'
          WINDOW_END: '03:00'
          MIN_MULTIPLIER: '5'
          MAX_MULTIPLIER: '10'
        run: |
          # GitHub Actions can't schedule more often than every 5 minutes,
          # so we squeeze 5 checks (~60s apart) into each 5-minute trigger.
          for i in 1 2 3 4 5; do
            echo "=== Check #$i ($(date -u)) ==="
            python monitor.py || true
            if [ "$i" -lt 5 ]; then
              sleep 55
            fi
          done

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update event state [skip ci]"
          git push
